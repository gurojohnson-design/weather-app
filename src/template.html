<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="header">
        <h1>Hello welcome </h1>
        <button id="newToDo">New To Do Item</button>
    </div>
    
    <div id="toDoFormContainer">
        <form action="" method="get" id="toDoForm">
            <div class="formRow">
                <label for="title">Title:</label>
                <input type="text" name="title" id="title" required>
            </div>
            <div class="formRow">
                <label for="dueDate">Get Done By:</label>
                <input type="date" name="dueDate" id="dueDate" required>
            </div>
            <div class="formRow">
                <select id="priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="formRow">
                <label for="notes">Notes:</label>
                <input type="text" name="notes" id="notes">
            </div>
            <div class="formRow">
                <button type="submit" id="toDoSubmitBtn">Submit</button>
                <button type="button" id="toDoDone">Done</button>
                
            </div>
        </form>
    </div>
    
    <div id="content">
    </div>

    <div id="sidebar">
        <div id="sidebarTop"></div>
        <div id="folderFormContainer">
            <form action="" method="post" id="folderForm">
                <div class="formRow">
                    <label for="folderTitle">Title:</label>
                    <input type="text" name="folderTitle" id="folderTitle" required>
                    <div class="formRow">
                        <button type="submit" id="folderSubmitBtn">Submit</button>
                        <button type="button" id="folderDone">Done</button>
                    </div>
                </div>
            </form>
        </div>
        <div id="folderList"></div>

    </div>



</body>
</html>
